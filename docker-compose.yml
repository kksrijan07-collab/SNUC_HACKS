version: "3.9"

# =============================================================================
# SYNCRO — Accountability Engine
# Docker Compose Stack
# =============================================================================
# Services:
#   api         — FastAPI backend (Python) — runs the Auditor
#   worker      — Background task runner (APScheduler) — fires 24 h audits
#   frontend    — Vite + React dashboard
#   db          — PostgreSQL 15
#   redis       — Job queue / caching
#   caddy       — Reverse proxy with automatic HTTPS (prod) / plain HTTP (dev)
# =============================================================================

services:

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syncro_api
    restart: unless-stopped
    environment:
      DATABASE_URL:       "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL:          "redis://redis:6379/0"
      SECRET_KEY:         "${SECRET_KEY}"
      ALLOWED_ORIGINS:    "${ALLOWED_ORIGINS:-http://localhost:5173}"
      GITHUB_TOKEN:       "${GITHUB_TOKEN:-}"        # optional — raises rate-limit
      AUDIT_INTERVAL_H:   "24"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - syncro_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Worker (scheduler) ───────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syncro_worker
    restart: unless-stopped
    command: ["python", "-m", "syncro.worker"]
    environment:
      DATABASE_URL:     "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL:        "redis://redis:6379/0"
      SECRET_KEY:       "${SECRET_KEY}"
      GITHUB_TOKEN:     "${GITHUB_TOKEN:-}"
      AUDIT_INTERVAL_H: "24"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - syncro_net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    container_name: syncro_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    networks:
      - syncro_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: syncro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     "${POSTGRES_USER:-syncro}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
      POSTGRES_DB:       "${POSTGRES_DB:-syncro}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migration.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    networks:
      - syncro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncro} -d ${POSTGRES_DB:-syncro}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: syncro_redis
    restart: unless-stopped
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --requirepass "${REDIS_PASSWORD:-changeme}"
    volumes:
      - redis_data:/data
    networks:
      - syncro_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Caddy (reverse proxy) ────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: syncro_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    networks:
      - syncro_net

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: syncro_postgres_data
  redis_data:
    name: syncro_redis_data
  caddy_data:
    name: syncro_caddy_data
  caddy_config:
    name: syncro_caddy_config

# =============================================================================
# Networks
# =============================================================================
networks:
  syncro_net:
    name: syncro_net
    driver: bridge

# =============================================================================
# Usage
# =============================================================================
# Development:
#   cp .env.example .env          # fill in your secrets
#   docker compose up --build -d
#   docker compose logs -f api worker
#
# Run migrations manually (if not using initdb):
#   docker compose exec db psql -U syncro -d syncro -f /docker-entrypoint-initdb.d/001_init.sql
#
# Production (set ALLOWED_ORIGINS, real SECRET_KEY, real passwords):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
